name: ci-cd

# Test on every PR; test + deploy on push to main. Auth to GCP is keyless via
# Workload Identity Federation (no service-account keys). Required repo variables:
#   GCP_PROJECT, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOY_SA  (see scripts/setup-wif.sh)
#
# The evals job is scoped: model-in-the-loop evals measure agent behavior, so
# they run only when the diff can change agent behavior (the `changes` job).
# A docs-only push skips them and still deploys - a gate should be a function
# of the diff it gates (docs/DECISIONS.md section 10).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for WIF OIDC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps
        run: uv sync
      - name: Tests (unit + contract tripwire)
        run: uv run pytest -q

  changes:
    # Decides whether this diff can change agent behavior. Plain git diff on
    # purpose (no third-party action). Unknown or unusable diff base (first
    # push, force-push) defaults to relevant=true - when in doubt, run the
    # evals.
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.diff.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        name: Detect agent-shaping changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "No usable diff base; defaulting to relevant=true"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")
          echo "Changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(agents/|tools/|eval/|tests/test_evals\.py|pyproject\.toml|uv\.lock|\.github/workflows/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  evals:
    # ADK evals are model-in-the-loop (Vertex AI via WIF), so they cannot run on
    # forked PRs, which don't get id-token permissions. The `adk eval` CLI does
    # NOT auto-discover eval/test_config.json (only the pytest AgentEvaluator
    # does), so the config must be passed explicitly — without it the CLI grades
    # response_match at 0.8 instead of our deliberate 0.5. The committed
    # evalsets get their first verified baseline here (see eval/README.md): if a
    # run fails, decide agent regression vs reference drift — never fix both in
    # one commit (CLAUDE.md).
    needs: [test, changes]
    if: needs.changes.outputs.relevant == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps (with adk eval scoring extras)
        run: uv sync --extra eval
      - id: auth
        name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      # The `adk eval` CLI always exits 0, even when evals fail, so it cannot
      # gate this job. tests/test_evals.py wraps the same evalsets in ADK's
      # AgentEvaluator, which asserts on failures (and auto-discovers
      # eval/test_config.json). RUN_ADK_EVALS=1 opts in the model-in-the-loop
      # tests that the default test job skips.
      - name: ADK evals (intake, fare_prep, policy)
        env:
          GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_REGION }}
          RUN_ADK_EVALS: "1"
        run: uv run pytest tests/test_evals.py -v

  deploy:
    # Runs when tests pass AND evals either passed or were skipped BECAUSE the
    # diff could not change agent behavior (changes.relevant == false). Any
    # other evals outcome - failure, or skipped for an unexpected reason -
    # blocks the deploy. `!cancelled()` is required: with a skipped job in
    # `needs`, the default success() condition would skip deploy entirely.
    needs: [test, changes, evals]
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success' && needs.changes.result == 'success' && (needs.evals.result == 'success' || (needs.evals.result == 'skipped' && needs.changes.outputs.relevant == 'false')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: engine
        name: Resolve the deployed engine URL
        run: |
          URL=$(gcloud run services describe travel-fare-engine \
            --project "${{ vars.GCP_PROJECT }}" --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')
          if [ -z "$URL" ]; then echo "engine service not found — deploy it first"; exit 1; fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy orchestrator (private, Vertex)
        run: |
          gcloud run deploy travel-prequal \
            --source . \
            --project "${{ vars.GCP_PROJECT }}" \
            --region "${{ vars.GCP_REGION }}" \
            --service-account "travel-prequal-sa@${{ vars.GCP_PROJECT }}.iam.gserviceaccount.com" \
            --no-allow-unauthenticated \
            --min-instances=0 --max-instances=2 --cpu=1 --memory=1Gi --timeout=300 \
            --set-env-vars "GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT }},GOOGLE_CLOUD_LOCATION=${{ vars.GCP_REGION }},FARE_ENGINE_URL=${{ steps.engine.outputs.url }}"

      - id: svc
        name: Resolve orchestrator URL
        run: |
          URL=$(gcloud run services describe travel-prequal \
            --project "${{ vars.GCP_PROJECT }}" --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - id: idtoken
        name: Mint ID token for the smoke test (IAP-fronted service)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: id_token
          # travel-prequal is fronted by IAP (docs/DECISIONS.md section 6). IAP
          # authenticates a programmatic caller by an OIDC token whose audience is
          # the IAP OAuth client ID, NOT the Cloud Run service URL - a service-URL
          # audience is rejected with "Invalid JWT audience". The deploy SA must
          # also hold roles/iap.httpsResourceAccessor on the service.
          id_token_audience: ${{ vars.GCP_IAP_CLIENT_ID }}
          id_token_include_email: true

      - name: Smoke test (/list-apps includes orchestrator, through IAP)
        run: |
          URL="${{ steps.svc.outputs.url }}"
          CODE=$(curl -sS -o /tmp/list-apps.json -w '%{http_code}' \
            -H "Authorization: Bearer ${{ steps.idtoken.outputs.id_token }}" \
            "${URL}/list-apps")
          echo "HTTP ${CODE}:"; cat /tmp/list-apps.json; echo
          [ "${CODE}" = "200" ] \
            || { echo "smoke test: expected HTTP 200 through IAP, got ${CODE} (check the deploy SA's roles/iap.httpsResourceAccessor grant and GCP_IAP_CLIENT_ID)"; exit 1; }
          jq -e 'index("orchestrator")' /tmp/list-apps.json >/dev/null \
            || { echo "orchestrator app not listed"; exit 1; }
          echo "Smoke test passed."
